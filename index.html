<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Classificação Geral - Gincana</title>
<style>
:root{--azul:#072b63;--azul2:#0b4db3;--dourado:#ffc928}
*{box-sizing:border-box} 
body{margin:0;font-family:Arial,sans-serif;background:#eef2f7;padding-bottom:20px}
header{background:linear-gradient(135deg,var(--azul),var(--azul2));color:#fff;padding:20px 15px;text-align:center;position:relative}
header h1{color:var(--dourado);margin:0;font-size:1.8em;letter-spacing:1px}
header p{margin:5px 0 0 0;font-size:1em;opacity:0.9}
.btn-admin{position:absolute;top:15px;right:15px;background:rgba(255,255,255,0.15);color:#fff;text-decoration:none;padding:6px 12px;border-radius:8px;font-size:0.8em;font-weight:bold;border:1px solid rgba(255,255,255,0.3)}
.btn-admin:hover{background:rgba(255,255,255,0.3)}
.container{padding:10px;max-width:600px;margin:auto}
.card{background:#fff;border-radius:15px;padding:12px;margin-bottom:15px;box-shadow:0 4px 15px rgba(0,0,0,.08)}

#ranking {
  display: flex;
  flex-direction: column;
}

.item{
  display:flex;
  align-items:center;
  gap:12px;
  background:linear-gradient(90deg,#001b42,#003d8f);
  color:#fff;
  padding:14px 12px;
  border-radius:12px;
  margin:6px 0;
  box-shadow:0 2px 5px rgba(0,0,0,.15);
  will-change: transform;
}

/* CONTAINER DA MEDALHA / POSIÇÃO */
.medal{
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  width: 35px;
  height: 35px;
  text-align: center;
  font-weight: bold;
  flex-shrink: 0;
}

/* CÍRCULO BRANCO PARA O NÚMERO EM AZUL (4º LUGAR PARA BAIXO) */
.num-circle {
  background: #fff;
  color: var(--azul2);
  font-size: 16px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

.name{flex:1;font-size:16px;font-weight:bold;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score{font-size:20px;color:var(--dourado);font-weight:bold;white-space:nowrap;flex-shrink:0}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:#fff;padding:10px 5px;border-radius:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.stat h3{margin:0;font-size:1.1em;color:var(--azul2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat p{margin:3px 0 0 0;color:#666;font-size:0.75em;line-height:1.1}

@media(max-width:360px){
  header h1{font-size:1.5em}
  .name{font-size:14px}
  .score{font-size:18px}
  .stat h3{font-size:1em}
  .stat p{font-size:0.7em}
}
</style>
</head>
<body>

<header>
  <h1>🏆 RANKING DA GINCANA</h1>
  <p>Classificação em Tempo Real</p>
  <a href="admin.html" class="btn-admin">✏️ Admin</a>
</header>

<div class="container">
<div class="stats">
  <div class="stat"><h3 id="totalP">0</h3><p>Participantes</p></div>
  <div class="stat"><h3 id="topScore">0</h3><p>Líder Atual</p></div>
  <div class="stat"><h3 id="lastUpdate">-</h3><p>Atualizado</p></div>
</div>

<div class="card">
  <div id="ranking"></div>
</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC2y5Aiu_3Zl2dDl6IXeCDVag5O3y-KKW0",
    authDomain: "ranking-embaixadores.firebaseapp.com",
    databaseURL: "https://ranking-embaixadores-default-rtdb.firebaseio.com",
    projectId: "ranking-embaixadores",
    storageBucket: "ranking-embaixadores.firebasestorage.app",
    messagingSenderId: "841956353715",
    appId: "1:841956353715:web:e0d6512b252d599236f2c6",
    measurementId: "G-2ETYL3D1EK"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const rankingRef = ref(db, 'gincana/ranking');

  let ultimoLider = null;

  // Lógica alterada para embutir a classe num-circle a partir do 4º lugar
  function renderMedal(i) {
    if (i == 0) return "🥇";
    if (i == 1) return "🥈";
    if (i == 2) return "🥉";
    return `<span class="num-circle">${i + 1}</span>`;
  }

  function tocarSomLider() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const notas = [523.25, 659.25, 783.99, 1046.50]; 
      notas.forEach((frequencia, i) => {
        setTimeout(() => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.value = frequencia;
          gain.gain.setValueAtTime(0.1, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + 0.4);
        }, i * 150);
      });
    } catch (e) { console.log("Áudio pendente de clique."); }
  }

  if (rankingRef) {
    onValue(rankingRef, (snapshot) => {
      const data = snapshot.val();
      const dados = data ? Object.values(data) : [];
      
      dados.sort((a,b)=>b.pontos-a.pontos);

      const container = document.getElementById("ranking");
      const itensAntigos = Array.from(container.children);
      const posicoesAntigas = {};
      
      itensAntigos.forEach(item => {
        const nome = item.dataset.nome;
        if (nome) posicoesAntigas[nome] = item.offsetTop;
      });

      container.innerHTML = dados.map((p,i)=>`
        <div class="item" data-nome="${p.nome}">
          <div class="medal">${renderMedal(i)}</div>
          <div class="name">${p.nome}</div>
          <div class="score">${p.pontos} pts</div>
        </div>
      `).join("");

      requestAnimationFrame(() => {
        Array.from(container.children).forEach(item => {
          const nome = item.dataset.nome;
          const posAntiga = posicoesAntigas[nome];
          
          if (posAntiga !== undefined) {
            const posNova = item.offsetTop;
            const diferenca = posAntiga - posNova;
            
            if (diferenca !== 0) {
              item.style.transition = 'none';
              item.style.transform = `translateY(${diferenca}px)`;
              
              刻意delay
              setTimeout(() => {
                item.style.transition = 'transform 0.6s cubic-bezier(0.25, 1, 0.5, 1)';
                item.style.transform = 'translateY(0)';
              }, 20);
            }
          }
        });
      });

      if (dados.length > 0) {
        const liderAtual = dados[0].nome;
        if (ultimoLider !== null && ultimoLider !== liderAtual && dados[0].pontos > 0) {
          tocarSomLider();
        }
        ultimoLider = liderAtual;
      }

      document.getElementById("totalP").innerText = dados.length;
      document.getElementById("topScore").innerText = dados[0] ? dados[0].pontos + " pts" : "0 pts";
      document.getElementById("lastUpdate").innerText = new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
    });
  }
</script>
</body>
</html>
