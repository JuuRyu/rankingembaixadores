<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Painel Admin - Celular</title>
<style>
:root{--azul:#072b63;--azul2:#0b4db3;--dourado:#ffc928;--verde:#28a745;--vermelho:#dc3545}
*{box-sizing:border-box} 
body{margin:0;font-family:Arial,sans-serif;background:#eef2f7;padding-bottom:30px}
header{background:linear-gradient(135deg,var(--azul),var(--azul2));color:#fff;padding:15px 10px;text-align:center}
header h1{color:var(--dourado);margin:0;font-size:1.5em}
header p{margin:4px 0 0 0;font-size:0.9em;opacity:0.8}
.container{padding:8px;max-width:600px;margin:auto}
.card{background:#fff;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.card h3{margin-top:0;margin-bottom:10px;color:#333;font-size:1.1em}
input,button{padding:12px;border-radius:8px;font-size:14px}
input{width:100%;border:1px solid #ccc;outline:none}
input:focus{border-color:var(--azul2)}
button{border:none;cursor:pointer;font-weight:bold;touch-action:manipulation}
.blue{background:var(--azul2);color:#fff}.green{background:var(--verde);color:#fff}.red{background:var(--vermelho);color:#fff}

.grid-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
.grid-actions button, .grid-actions a{width:100%;text-align:center;font-size:13px}
.grid-quick{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}

#ranking {position: relative;}

.item{display:flex;flex-direction:column;background:linear-gradient(90deg,#001b42,#003d8f);color:#fff;padding:10px;border-radius:10px;margin:8px 0;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.row-top{display:flex;align-items:center;gap:8px;width:100%;margin-bottom:8px}

.medal{
  display: flex;
  align-items: center;
  justify-content: center;
  font-size:20px;
  font-weight:bold;
  width:28px;
  height: 28px;
  text-align:center;
  flex-shrink: 0;
}

/* CIRCULO PARA PAGINA ADMIN */
.num-circle {
  background: #fff;
  color: var(--azul2);
  font-size: 13px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

.name{flex:1;font-size:16px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score{font-size:20px;color:var(--dourado);font-weight:bold;padding-right:5px}

.row-controls{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;width:100%;scrollbar-width:none}
.row-controls::-webkit-scrollbar{display:none}
.row-controls button{padding:8px 12px;font-size:12px;flex-shrink:0;border-radius:6px}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.stat{background:#fff;padding:8px 4px;border-radius:10px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.stat h3{margin:0;font-size:1.1em;color:var(--azul2)}
.stat p{margin:2px 0 0 0;color:#666;font-size:0.7em}

#loginOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#072b63;display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px}
#loginBox{background:#fff;padding:24px;border-radius:12px;max-width:360px;width:100%;text-align:center;box-shadow:0 8px 20px rgba(0,0,0,0.3)}
#appContent{display:none}
</style>
</head>
<body>

<div id="loginOverlay">
  <div id="loginBox">
    <h3 style="color:#072b63;margin-top:0;">🔐 Área Restrita Admin</h3>
    <p style="color:#666;font-size:14px;">Digite a senha master para gerenciar:</p>
    <input type="password" id="passInput" placeholder="Senha" onkeypress="if(event.key==='Enter') verificarSenha()"><br><br>
    <button class="blue" style="width:100%" onclick="verificarSenha()">Entrar no Painel</button>
  </div>
</div>

<div id="appContent">
  <header>
    <h1>⚙️ PAINEL ADMIN</h1>
    <p>Controle Móvel de Notas</p>
  </header>

  <div class="container">
    <div class="card">
      <input id="cmd" list="nomes" placeholder="+5 João ou -2 Maria">
      <datalist id="nomes"></datalist>
      <div class="grid-actions">
        <button class="blue" onclick="execCmd()">Executar</button>
        <button class="blue" onclick="toggleTelao()">📺 Modo Telão</button>
        <button class="green" onclick="exportCSV()">Exportar CSV</button>
        <button class="green" onclick="document.getElementById('importFile').click()">Importar CSV</button>
      </div>
      <input type="file" id="importFile" style="display:none" onchange="importCSV(event)">
    </div>

    <div class="card">
      <h3>⚡ Pontuação Rápida</h3>
      <input id="quickName" list="nomes" placeholder="Nome do participante"><br><br>
      <div class="grid-quick">
        <button class="green" onclick="quick(1)">+1</button>
        <button class="green" onclick="quick(5)">+5</button>
        <button class="red" onclick="quick(-1)">-1</button>
        <button class="red" onclick="quick(-5)">-5</button>
      </div>
    </div>

    <div class="card" style="padding:8px;">
      <div class="stats">
        <div class="stat"><h3 id="totalP">0</h3><p>Partic.</p></div>
        <div class="stat"><h3 id="topScore">0</h3><p>Maior</p></div>
        <div class="stat"><h3 id="lastUpdate">-</h3><p>Última</p></div>
      </div>
    </div>

    <div class="card">
      <h3>🥇 Lista de Participantes</h3>
      <div id="ranking"></div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC2y5Aiu_3Zl2dDl6IXeCDVag5O3y-KKW0",
    authDomain: "ranking-embaixadores.firebaseapp.com",
    databaseURL: "https://ranking-embaixadores-default-rtdb.firebaseio.com",
    projectId: "ranking-embaixadores",
    storageBucket: "ranking-embaixadores.firebasestorage.app",
    messagingSenderId: "841956353715",
    appId: "1:841956353715:web:e0d6512b252d599236f2c6",
    measurementId: "G-2ETYL3D1EK"
  };

  let app, db, rankingRef, analytics;
  let dados = [];

  const hashCorreto = "240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9"; 

  async function sha256(text) {
    const encoder = new TextEncoder();
    const data = encoder.encode(text);
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  window.verificarSenha = async function() {
    const input = document.getElementById("passInput").value;
    const inputHash = await sha256(input);
    
    if(inputHash === hashCorreto) {
      document.getElementById("loginOverlay").style.display = "none";
      document.getElementById("appContent").style.display = "block";
      inicializarFirebase();
    } else {
      alert("❌ Senha incorreta!");
      document.getElementById("passInput").value = "";
    }
  }

  function inicializarFirebase() {
    try {
      app = initializeApp(firebaseConfig);
      db = getDatabase(app);
      analytics = getAnalytics(app);
      rankingRef = ref(db, 'gincana/ranking');
      
      if (rankingRef) {
        onValue(rankingRef, (snapshot) => {
          const data = snapshot.val();
          dados = data ? Object.values(data) : [];
          updateInterface();
        });
      }
    } catch (e) { console.error(e); }
  }

  function saveData() {
    if (!db || !rankingRef) return;
    const dataObject = {};
    dados.forEach(p => {
      const chaveSegura = p.nome.toLowerCase().replace(/[.#$/\[\]]/g, "_");
      dataObject[chaveSegura] = p; 
    });
    set(rankingRef, dataObject);
  }

  // Lógica alterada para embutir a classe num-circle no admin também
  function renderMedal(i) {
    if (i == 0) return "🥇";
    if (i == 1) return "🥈";
    if (i == 2) return "🥉";
    return `<span class="num-circle">${i + 1}</span>`;
  }

  function updateInterface() {
    dados.sort((a,b)=>b.pontos-a.pontos);

    const container = document.getElementById("ranking");
    const itensAntigos = Array.from(container.children);
    const posicoesAntigas = {};
    
    itensAntigos.forEach(item => {
      const nome = item.dataset.nome;
      if (nome) posicoesAntigas[nome] = item.offsetTop;
    });

    container.innerHTML=dados.map((p,i)=>`
    <div class="item" data-nome="${p.nome}">
      <div class="row-top">
        <div class="medal">${renderMedal(i)}</div>
        <div class="name">${p.nome}</div>
        <div class="score">${p.pontos}</div>
      </div>
      <div class="row-controls">
        <button class="green" onclick="change('${p.nome}',1)">+1</button>
        <button class="green" onclick="change('${p.nome}',5)">+5</button>
        <button class="red" onclick="change('${p.nome}',-1)">-1</button>
        <button class="red" onclick="change('${p.nome}',-5)">-5</button>
        <button class="blue" onclick="renamePlayer('${p.nome}')">✏️ Editar</button>
        <button class="red" onclick="removePlayer('${p.nome}')">🗑️ Excluir</button>
      </div>
    </div>`).join("");

    Array.from(container.children).forEach(item => {
      const nome = item.dataset.nome;
      const posAntiga = posicoesAntigas[nome];
      if (posAntiga !== undefined) {
        const posNova = item.offsetTop;
        const diferenca = posAntiga - posNova;
        if (diferenca !== 0) {
          item.style.transform = `translateY(${diferenca}px)`;
          item.style.transition = 'none';
          requestAnimationFrame(() => {
            item.style.transition = 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)';
            item.style.transform = 'translateY(0)';
          });
        }
      }
    });

    document.getElementById("nomes").innerHTML=dados.map(p=>`<option value="${p.nome}">`).join("");
    document.getElementById("totalP").innerText=dados.length;
    document.getElementById("topScore").innerText=dados[0]?.pontos||0;
    document.getElementById("lastUpdate").innerText=new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
  }

  function removePlayerFromData(nome) {
    dados=dados.filter(x=>x.nome!==nome);
  }

  window.execCmd = function() {
    let t=document.getElementById("cmd").value.trim();
    let m=t.match(/([+-]\d+)\s+(.+)/);
    if(!m){alert("Use o formato: +5 João");return;}
    let valor=parseInt(m[1]), nome=m[2];
    let p=dados.find(x=>x.nome.toLowerCase()==nome.toLowerCase());
    if(p) p.pontos+=valor; else dados.push({nome:nome,pontos:valor});
    document.getElementById("cmd").value="";
    saveData();
  }

  window.change = function(nome, v) {
    let p=dados.find(x=>x.nome.toLowerCase()===nome.toLowerCase());
    if(p){
      p.pontos+=v;
      saveData();
    }
  }

  window.quick = function(v) {
    let nome=document.getElementById("quickName").value.trim();
    if(!nome) return;
    let p=dados.find(x=>x.nome.toLowerCase()===nome.toLowerCase());
    if(p) {
      window.change(nome, v);
    } else {
      if(confirm(`Criar "${nome}" com ${v} pontos?`)){
        dados.push({nome: nome, pontos: v});
        saveData();
      }
    }
    document.getElementById("quickName").value = "";
  }

  window.renamePlayer = function(nome) {
    let novo=prompt("Novo nome:",nome);
    if(!novo)return;
    let p = dados.find(x=>x.nome===nome);
    if(p) {
      removePlayerFromData(nome);
      dados.push({nome: novo, pontos: p.pontos});
      saveData();
    }
  }

  window.removePlayer = function(nome) {
    if(confirm("Eliminar "+nome+"?")){
      removePlayerFromData(nome);
      saveData();
    }
  }

  window.exportCSV = function() {
    let csv="Nome;Pontos\n"+dados.map(p=>`${p.nome};${p.pontos}`).join("\n");
    let a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    a.download="ranking.csv";
    a.click();
  }

  window.importCSV = function(e) {
    const file=e.target.files[0];
    if(!file)return;
    const r=new FileReader();
    r.onload=function(){
      const linhas=r.result.split(/\r?\n/).slice(1);
      linhas.forEach(l=>{
        const c=l.split(";");
        if(c.length >= 2 && c[0].trim() !== "") {
          let nome = c[0].trim();
          let pontos = Number(c[1])||0;
          let p=dados.find(x=>x.nome.toLowerCase()==nome.toLowerCase());
          if(p) p.pontos = pontos; else dados.push({nome:nome,pontos:pontos});
        }
      });
      saveData();
    }
    r.readAsText(file);
  }

  window.toggleTelao = function() {
    window.location.href = "index.html";
  }
</script>
</body>
</html>
